version: 1
runtime: typescript
entry: src/index.ts

build:
  install: npm ci
  command: npm run build

startCommand:
  type: http
  command: node dist/index.js

configSchema:
  type: object
  properties:
    GITHUB_TOKEN:
      type: string
      title: GitHub Personal Access Token
      description: Optional: Your GitHub personal access token with repo scope. If not provided, users can pass github_token per-request in tool calls (recommended for multi-user setups).
      format: password
      required: false
