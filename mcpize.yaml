version: 1
runtime: typescript
entry: src/index.ts

build:
  install: npm ci
  command: npm run build

startCommand:
  type: http
  command: node dist/index.js

configSchema:
  type: object
  properties:
    GITHUB_TOKEN:
      type: string
      title: GitHub Personal Access Token
      description: Your GitHub personal access token with repo scope
      format: password
      required: true
