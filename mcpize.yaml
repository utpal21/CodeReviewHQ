version: 1
runtime: typescript
entry: src/index.ts

build:
  install: npm ci
  command: npm run build

startCommand:
  type: http
  command: node dist/index.js

configSchema:
  type: object
  properties:
    GITHUB_TOKEN:
      type: string
      title: GitHub Personal Access Token
      description: Your GitHub personal access token with repo scope (permissions: repo, read:org). This token will be used to access your repositories for code review.
      format: password
      required: true
    GITHUB_OWNER:
      type: string
      title: GitHub Owner (Optional)
      description: Your GitHub username or organization name (optional, can be provided per-request)
      required: false
    GITHUB_REPO:
      type: string
      title: GitHub Repository (Optional)
      description: Your default repository name (optional, can be provided per-request)
      required: false
