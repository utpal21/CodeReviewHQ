version: 1
runtime: typescript
entry: src/index.ts

build:
  install: npm ci
  command: npm run build

startCommand:
  type: http
  command: node dist/index.js

configSchema:
  type: object
  properties:
    GITHUB_TOKEN:
      type: string
      title: GitHub Personal Access Token (Optional)
      description: Your GitHub personal access token with repo scope. If not provided here, pass it in each tool call as 'github_token' parameter.
      format: password
      required: false
    GITHUB_OWNER:
      type: string
      title: GitHub Owner (Optional)
      description: Your GitHub username or organization name (optional, can be provided per-request)
      required: false
    GITHUB_REPO:
      type: string
      title: GitHub Repository (Optional)
      description: Your default repository name (optional, can be provided per-request)
      required: false
